services:

  redis:
    image: redis:7-alpine
    container_name: fixora_redis_dev
    restart: unless-stopped
    ports:
      - "6379:6379"
    command: redis-server --requirepass ${REDIS_PASSWORD:-redis123} --appendonly yes
    volumes:
      - fixora_redis_dev:/data
    networks:
      - fixora_dev

  backend:
    build:
      context: ./backend
      target: development
    container_name: fixora_backend_dev
    restart: unless-stopped
    ports:
      - "5001:5001"
      - "9229:9229"
    env_file:
    - ./backend/.env  

    environment:
      NODE_ENV: development
      PORT: 5001

    volumes:
    - ./backend:/app
    - /app/node_modules

    depends_on:
    - redis
    networks:
    - fixora_dev

  frontend:
    build:
      context: ./frontend
      target: development
    container_name: fixora_frontend_dev
    restart: unless-stopped
    ports:
      - "5173:5173"
    environment:
      VITE_API_URL: ${VITE_API_URL:-http://localhost:5001/api}
      VITE_SOCKET_URL: ${VITE_SOCKET_URL:-http://localhost:5001}
      VITE_STRIPE_PUBLIC_KEY: ${VITE_STRIPE_PUBLIC_KEY}
      VITE_GOOGLE_MAPS_API_KEY: ${VITE_GOOGLE_MAPS_API_KEY}
      CHOKIDAR_USEPOLLING: "true"
      WATCHPACK_POLLING: "true"
    volumes:
      - ./frontend:/app
      - /app/node_modules
    depends_on:
      - backend
    networks:
      - fixora_dev
    stdin_open: true
    tty: true

volumes:
  fixora_redis_dev:

networks:
  fixora_dev:
    driver: bridge
